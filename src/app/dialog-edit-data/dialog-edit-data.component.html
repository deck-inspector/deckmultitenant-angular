<h1 mat-dialog-title class="mat-dialog-title">Edit Tenant</h1>
<div mat-dialog-content class="mat-dialog-content">
  <div class="icon-section">
    <div class="form-field">
      <h6>Company Logo</h6>
      <input type="file" id="logoFileInput" (change)="onFileSelected('companyLogo', $event)" accept="image/jpeg, image/jpg, image/png" />
      <div *ngIf="logoPreviewUrl" class="image-preview">
        <img [src]="logoPreviewUrl" alt="Image Preview" class="preview-image">
      </div>
    </div>

    <div class="form-field">
      <h6>Report Header</h6>
      <input type="file" id="headerFileInput" (change)="onFileSelected('reportHeader', $event)" accept="image/jpeg, image/jpg, image/png" />
      <div *ngIf="headerPreviewUrl" class="image-preview">
        <img [src]="headerPreviewUrl" alt="Image Preview" class="preview-image">
      </div>
    </div>

    <div class="form-field">
      <h6>Report Footer</h6>
      <input type="file" id="footerFileInput" (change)="onFileSelected('reportFooter', $event)" accept="image/jpeg, image/jpg, image/png" />
      <div *ngIf="footerPreviewUrl" class="image-preview">
        <img [src]="footerPreviewUrl" alt="Image Preview" class="preview-image">
      </div>
    </div>
  </div>
  <div class="form-field">
    <h6>Contact Info (printed on reports)</h6>
    <label for="tenantPhoneInput">Phone</label>
    <input type="text" id="tenantPhoneInput" [(ngModel)]="phone" placeholder="e.g. 888-224-0489" />
    <label for="tenantWebsiteInput">Website</label>
    <input type="text" id="tenantWebsiteInput" [(ngModel)]="website" placeholder="e.g. www.yourcompany.com" />
    <button mat-button [disabled]="isSavingContact" (click)="saveContactInfo()">
      <mat-spinner *ngIf="isSavingContact" diameter="20"></mat-spinner>
      <span *ngIf="!isSavingContact">Save Contact Info</span>
    </button>
  </div>

  <div class="form-field">
    <h6>Final Report Template (.docx)</h6>
    <input type="file" id="finalTemplateInput" (change)="onTemplateSelected($event)" accept=".docx" />
    <button mat-button [disabled]="!templateFile || isUploadingTemplate" (click)="uploadFinalTemplate()">
      <mat-spinner *ngIf="isUploadingTemplate" diameter="20"></mat-spinner>
      <span *ngIf="!isUploadingTemplate">Upload Template</span>
    </button>
  </div>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-button [disabled]="isSaving" (click)="submitData()">
    <mat-spinner *ngIf="isSaving" diameter="25"></mat-spinner>
    <span *ngIf="!isSaving">Ok</span>
  </button>
</div>
